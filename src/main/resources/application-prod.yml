server:
  port: 8080

spring:
  application:
    name: delay-task-platform
  profiles:
    active: prod
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/delay_task?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 20
        min-idle: 5
        max-wait: 3000

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 5
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.delaytask.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.delaytask: info
    org.springframework: warn
  file:
    name: /opt/logs/delay-task-platform/app.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 2GB
