version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: delay-task-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: delay_task
      MYSQL_USER: delay_task
      MYSQL_PASSWORD: delay_task123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - delay-task-network

  redis:
    image: redis:7.0
    container_name: delay-task-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redis_data:/data
    networks:
      - delay-task-network

  rabbitmq:
    image: rabbitmq:3.9-management
    container_name: delay-task-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - delay-task-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delay-task-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/delay_task?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - delay-task-network

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:

networks:
  delay-task-network:
    driver: bridge
